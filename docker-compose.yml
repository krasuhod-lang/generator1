# ═══════════════════════════════════════════════════════════════════════════
# SEO Genius v4.0 — Docker Compose
#
# Переменные окружения берутся из файла .env в корне проекта.
# Скопируйте .env.example → .env и заполните API-ключи перед запуском.
#
# Запуск:  docker compose up -d --build
# Стоп:    docker compose down
# Логи:    docker compose logs -f
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: seo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-seogenius_db}
      POSTGRES_USER:     ${POSTGRES_USER:-seogenius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Миграция применяется автоматически при первом запуске
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seogenius} -d ${POSTGRES_DB:-seogenius_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: seo_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Backend (Express + API) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_backend
    restart: unless-stopped
    # Даём время на graceful shutdown (остановка outreach-воркера, закрытие БД)
    # при обновлении/перезапуске — иначе SIGKILL оборвёт активную рассылку.
    stop_grace_period: 60s
    env_file: .env
    environment:
      NODE_ENV: development
      # БД — используем внутреннее имя сервиса Docker
      DATABASE_URL: postgres://${POSTGRES_USER:-seogenius}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seogenius_db}
      # Redis — внутреннее имя сервиса Docker (переопределяет .env если там localhost)
      REDIS_URL: redis://redis:6379
      # Релевантность: внутренний URL Python-микросервиса.
      RELEVANCE_INTERNAL_URL: ${RELEVANCE_INTERNAL_URL:-http://relevance:8000}
      RELEVANCE_INTERNAL_TOKEN: ${RELEVANCE_INTERNAL_TOKEN:-}
      # Headless-fallback (Playwright + stealth) для WAF/Cloudflare/SPA URL.
      # Контейнер `relevance_fetcher` поднимается ниже; наружу не торчит.
      RELEVANCE_HEADLESS_FETCHER_URL: ${RELEVANCE_HEADLESS_FETCHER_URL:-http://relevance_fetcher:8001/fetch}
      # Аудиты: внутренний URL Python-микросервиса технического/SEO-аудита.
      AUDIT_INTERNAL_URL: ${AUDIT_INTERNAL_URL:-http://audit:8002}
      # Прокси для Gemini API — загружаются из .env через env_file
      # (GEMINI_PROXY_URL, _HOST, _PORT, _USER, _PASS, _PROTO, _2, _3, _4, _5)
      # 🧬 Bio-Brain: внутренний URL aegis_py в docker-сети.
      AEGIS_PY_URL: ${AEGIS_PY_URL:-http://aegis_py:8800}
      # LinguaForensic v3.6 — общий skill-файл детектора AI-текста
      LINGUAFORENSIC_SKILL_PATH: ${LINGUAFORENSIC_SKILL_PATH:-/app/skills/AI-detect-v-3-6.md}
      # GIST Content Logic: внутренний URL gist_py (M3 Gap Finder для пайплайнов)
      GIST_SERVICE_URL: ${GIST_SERVICE_URL:-http://gist:8003}
      GIST_INTERNAL_TOKEN: ${GIST_INTERNAL_TOKEN:-}
      # M-1 Topic Discovery (InfoGapRadar) + видимый блок автора (E-E-A-T)
      TOPIC_DISCOVERY_ENABLED: ${TOPIC_DISCOVERY_ENABLED:-1}
      TOPIC_AUTO_PIVOT: ${TOPIC_AUTO_PIVOT:-0}
      TOPIC_TRENDS_ENABLED: ${TOPIC_TRENDS_ENABLED:-1}
      TOPIC_TRENDS_GEO: ${TOPIC_TRENDS_GEO:-}
      AUTHOR_BLOCK_ENABLED: ${AUTHOR_BLOCK_ENABLED:-1}
      FACTCHECK_FAIL_MODE: ${FACTCHECK_FAIL_MODE:-open}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      # brain_state/: compiled_writer.yaml + история DSPy retrain'ов.
      # Bind-mount, чтобы (1) уже существующие yaml-файлы видны контейнеру,
      # (2) DSPy retrain мог писать новые версии и они переживали restart.
      - ./brain_state:/app/brain_state
      # Skill-файлы (LinguaForensic v3.6 и др.)
      - ./skills:/app/skills:ro

  # ── Worker (BullMQ) ──────────────────────────────────────────────────────
  # Отдельный контейнер для воркера — не блокирует HTTP-сервер
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_worker
    restart: unless-stopped
    # Долгие LLM-стадии: даём воркеру время завершить текущий шаг и корректно
    # освободить lock job'а (worker.close()) до принудительного SIGKILL.
    # Незавершённый job продолжится с checkpoint после рестарта.
    stop_grace_period: 120s
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-seogenius}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seogenius_db}
      REDIS_URL: redis://redis:6379
      AEGIS_PY_URL: ${AEGIS_PY_URL:-http://aegis_py:8800}
      RELEVANCE_INTERNAL_URL: ${RELEVANCE_INTERNAL_URL:-http://relevance:8000}
      RELEVANCE_INTERNAL_TOKEN: ${RELEVANCE_INTERNAL_TOKEN:-}
      RELEVANCE_HEADLESS_FETCHER_URL: ${RELEVANCE_HEADLESS_FETCHER_URL:-http://relevance_fetcher:8001/fetch}
      # LinguaForensic v3.6 — общий skill-файл детектора AI-текста
      LINGUAFORENSIC_SKILL_PATH: ${LINGUAFORENSIC_SKILL_PATH:-/app/skills/AI-detect-v-3-6.md}
      # GIST Content Logic: внутренний URL gist_py (M3 Gap Finder для пайплайнов)
      GIST_SERVICE_URL: ${GIST_SERVICE_URL:-http://gist:8003}
      GIST_INTERNAL_TOKEN: ${GIST_INTERNAL_TOKEN:-}
      # M-1 Topic Discovery (InfoGapRadar) + видимый блок автора (E-E-A-T)
      TOPIC_DISCOVERY_ENABLED: ${TOPIC_DISCOVERY_ENABLED:-1}
      TOPIC_AUTO_PIVOT: ${TOPIC_AUTO_PIVOT:-0}
      TOPIC_TRENDS_ENABLED: ${TOPIC_TRENDS_ENABLED:-1}
      TOPIC_TRENDS_GEO: ${TOPIC_TRENDS_GEO:-}
      AUTHOR_BLOCK_ENABLED: ${AUTHOR_BLOCK_ENABLED:-1}
      FACTCHECK_FAIL_MODE: ${FACTCHECK_FAIL_MODE:-open}
    command: node src/queue/worker.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./brain_state:/app/brain_state
      # Skill-файлы (LinguaForensic v3.6 и др.)
      - ./skills:/app/skills:ro

  # ── Frontend (Vue 3 SPA → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL бэкенда для сборки Vite (используется в api.js)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    container_name: seo_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  # ── Relevance Analyzer (FastAPI + readability-lxml + pymorphy3 + BM25) ───
  # Stateless микросервис «Релевантности»: принимает список HTML, возвращает
  # JSON с BM25-словарём и n-граммами. Наружу не торчит — только во внутренней
  # сети Docker. Node-бэкенд ходит на http://relevance:8000 с заголовком
  # X-Internal-Token (значение из .env, обязательно совпадает с обеих сторон).
  relevance:
    build:
      context: ./relevance
      dockerfile: Dockerfile
    container_name: seo_relevance
    restart: unless-stopped
    environment:
      RELEVANCE_INTERNAL_TOKEN: ${RELEVANCE_INTERNAL_TOKEN:-}
      LOG_LEVEL: ${RELEVANCE_LOG_LEVEL:-INFO}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Relevance Headless Fetcher (Playwright + stealth) ───────────────────
  # «firecrawl-class» fallback для WAF/Cloudflare/SPA: pageFetcher.js шлёт
  # POST /fetch при 403/503/cf_clearance/«пустом теле», получает обратно
  # outerHTML после гидратации. Тяжёлый Chromium НЕ тащим в основной backend.
  # Использует общий RELEVANCE_INTERNAL_TOKEN. Внутренняя сеть, наружу не
  # торчит.
  relevance_fetcher:
    build:
      context: ./relevance_fetcher
      dockerfile: Dockerfile
    container_name: seo_relevance_fetcher
    restart: unless-stopped
    environment:
      RELEVANCE_INTERNAL_TOKEN: ${RELEVANCE_INTERNAL_TOKEN:-}
      LOG_LEVEL: ${RELEVANCE_FETCHER_LOG_LEVEL:-INFO}
      FETCHER_DEFAULT_TIMEOUT_MS: ${RELEVANCE_FETCHER_DEFAULT_TIMEOUT_MS:-35000}
      FETCHER_MAX_TIMEOUT_MS: ${RELEVANCE_FETCHER_MAX_TIMEOUT_MS:-60000}
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Audit Service (FastAPI + aiohttp BFS crawler + BS4 + networkx) ───────
  # Модуль «Аудиты»: технический и SEO-аудит сайта. Принимает URL, запускает
  # асинхронный BFS-краулинг (Semaphore(50), вежливые 200ms/домен), считает
  # 23 типа ошибок и Health Score. Антибот/SPA — эскалация к relevance_fetcher
  # (curl_cffi → Playwright). Наружу не торчит; Node ходит на http://audit:8002
  # с X-Internal-Token. Состояние задач — Redis (TTL 24ч), финальный отчёт
  # персистится Node-бэкендом в PostgreSQL.
  audit:
    build:
      context: ./audit
      dockerfile: Dockerfile
    container_name: seo_audit
    restart: unless-stopped
    environment:
      RELEVANCE_INTERNAL_TOKEN: ${RELEVANCE_INTERNAL_TOKEN:-}
      REDIS_URL: redis://redis:6379
      AUDIT_HEADLESS_FETCHER_URL: ${AUDIT_HEADLESS_FETCHER_URL:-http://relevance_fetcher:8001/fetch_html}
      LOG_LEVEL: ${AUDIT_LOG_LEVEL:-INFO}
    expose:
      - "8002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── GIST + LinguaForensic DSPy pipeline (gist_py, FastAPI :8003) ────────
  # Генерация SEO-контента по логике GIST: M0 Relevance Scanner → M1 Scraper
  # → M2 Noise → M3 Gap Finder → M4–M6 генерация → M7 Redundancy →
  # M8 LinguaForensic v3.6 → M9 Fluency Rewriter → M10 SEO Formatter.
  # Наружу не торчит: Node-бэкенд ходит на http://gist:8003 с X-Internal-Token.
  gist:
    build:
      context: ./gist_py
      dockerfile: Dockerfile
      args:
        INSTALL_HEAVY: ${GIST_PY_INSTALL_HEAVY:-false}
    container_name: seo_gist
    restart: unless-stopped
    environment:
      GIST_INTERNAL_TOKEN: ${GIST_INTERNAL_TOKEN:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      GIST_LLM_API_BASE: ${GIST_LLM_API_BASE:-}
      GIST_LLM_API_KEY: ${GIST_LLM_API_KEY:-}
      GIST_LLM_MODEL: ${GIST_LLM_MODEL:-gemini-3.1-pro-preview}
      GIST_EMBED_API_BASE: ${GIST_EMBED_API_BASE:-}
      GIST_EMBED_API_KEY: ${GIST_EMBED_API_KEY:-}
      GIST_LINGUAFORENSIC_SKILL: ${GIST_LINGUAFORENSIC_SKILL:-/app/skills/AI-detect-v-3-6.md}
      RELEVANCE_HEADLESS_FETCHER_URL: ${RELEVANCE_HEADLESS_FETCHER_URL:-http://relevance_fetcher:8001/fetch}
      DATABASE_URL: ${GIST_DATABASE_URL:-}
      LOG_LEVEL: ${GIST_LOG_LEVEL:-INFO}
    volumes:
      # Skill-файл LinguaForensic v3.6 (skills/AI-detect-v-3-6.md, в git)
      - ./skills:/app/skills:ro
    expose:
      - "8003"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── A.E.G.I.S. Python (Bio-Brain NEAT + DSPy + GraphRAG-фасад) ──────────
  # 🧬 Поднимаем по умолчанию в основном стеке, чтобы Bio-Brain «жил
  # своей жизнью»: фоновый поток `_biobrain_evolve_loop` в aegis_py/app/main.py
  # эволюционирует мозг, накопленный буфер опыта переживает рестарт через
  # volume aegis_brain_state. Без этого сервиса карточка «🧬 Bio-Brain» в UI
  # рисует прочерки. Тяжёлые зависимости (neo4j/qdrant/ray) остаются опциональными
  # и подключаются через docker-compose.aegis.yml override.
  aegis_py:
    build:
      context: ./aegis_py
      args:
        INSTALL_HEAVY: ${AEGIS_PY_INSTALL_HEAVY:-false}
    container_name: seo_aegis_py
    restart: unless-stopped
    ports:
      - "${AEGIS_PY_PORT:-8800}:8800"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AEGIS_NEO4J_URI:      ${AEGIS_NEO4J_URI:-}
      AEGIS_NEO4J_USER:     ${AEGIS_NEO4J_USER:-neo4j}
      AEGIS_NEO4J_PASSWORD: ${AEGIS_NEO4J_PASSWORD:-}
      AEGIS_QDRANT_URL:     ${AEGIS_QDRANT_URL:-}
      AEGIS_QDRANT_API_KEY: ${AEGIS_QDRANT_API_KEY:-}
      RAY_ADDRESS:          ${RAY_ADDRESS:-}
      GOOGLE_API_KEY:       ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY:     ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL:       ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      # Папка с лучшим геномом + persistent buffer (см. biobrain/storage.py).
      AEGIS_BIOBRAIN_DIR: /app/brain_state
    volumes:
      - aegis_brain_state:/app/brain_state
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8800/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  aegis_brain_state:
    driver: local
