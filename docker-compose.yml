# ═══════════════════════════════════════════════════════════════════════════
# SEO Genius v4.0 — Docker Compose
#
# Переменные окружения берутся из файла .env в корне проекта.
# Скопируйте .env.example → .env и заполните API-ключи перед запуском.
#
# Запуск:  docker compose up -d --build
# Стоп:    docker compose down
# Логи:    docker compose logs -f
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: seo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-seogenius_db}
      POSTGRES_USER:     ${POSTGRES_USER:-seogenius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Миграция применяется автоматически при первом запуске
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seogenius} -d ${POSTGRES_DB:-seogenius_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: seo_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Backend (Express + API) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      # БД — используем внутреннее имя сервиса Docker
      DATABASE_URL: postgres://${POSTGRES_USER:-seogenius}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seogenius_db}
      # Redis — внутреннее имя сервиса Docker (переопределяет .env если там localhost)
      REDIS_URL: redis://redis:6379
      # Прокси для Gemini API (из .env)
      GEMINI_PROXY_URL: ${GEMINI_PROXY_URL:-}
      GEMINI_PROXY_HOST: ${GEMINI_PROXY_HOST:-}
      GEMINI_PROXY_PORT: ${GEMINI_PROXY_PORT:-}
      GEMINI_PROXY_USER: ${GEMINI_PROXY_USER:-}
      GEMINI_PROXY_PASS: ${GEMINI_PROXY_PASS:-}
      GEMINI_PROXY_PROTO: ${GEMINI_PROXY_PROTO:-http}
      # Запасной прокси
      GEMINI_PROXY_URL_2: ${GEMINI_PROXY_URL_2:-}
      GEMINI_PROXY_HOST_2: ${GEMINI_PROXY_HOST_2:-}
      GEMINI_PROXY_PORT_2: ${GEMINI_PROXY_PORT_2:-}
      GEMINI_PROXY_USER_2: ${GEMINI_PROXY_USER_2:-}
      GEMINI_PROXY_PASS_2: ${GEMINI_PROXY_PASS_2:-}
      GEMINI_PROXY_PROTO_2: ${GEMINI_PROXY_PROTO_2:-http}
      # Дополнительные прокси (_3, _4, _5)
      GEMINI_PROXY_URL_3: ${GEMINI_PROXY_URL_3:-}
      GEMINI_PROXY_URL_4: ${GEMINI_PROXY_URL_4:-}
      GEMINI_PROXY_URL_5: ${GEMINI_PROXY_URL_5:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ── Worker (BullMQ) ──────────────────────────────────────────────────────
  # Отдельный контейнер для воркера — не блокирует HTTP-сервер
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-seogenius}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seogenius_db}
      REDIS_URL: redis://redis:6379
      # Прокси для Gemini API (из .env)
      GEMINI_PROXY_URL: ${GEMINI_PROXY_URL:-}
      GEMINI_PROXY_HOST: ${GEMINI_PROXY_HOST:-}
      GEMINI_PROXY_PORT: ${GEMINI_PROXY_PORT:-}
      GEMINI_PROXY_USER: ${GEMINI_PROXY_USER:-}
      GEMINI_PROXY_PASS: ${GEMINI_PROXY_PASS:-}
      GEMINI_PROXY_PROTO: ${GEMINI_PROXY_PROTO:-http}
      # Запасной прокси
      GEMINI_PROXY_URL_2: ${GEMINI_PROXY_URL_2:-}
      GEMINI_PROXY_HOST_2: ${GEMINI_PROXY_HOST_2:-}
      GEMINI_PROXY_PORT_2: ${GEMINI_PROXY_PORT_2:-}
      GEMINI_PROXY_USER_2: ${GEMINI_PROXY_USER_2:-}
      GEMINI_PROXY_PASS_2: ${GEMINI_PROXY_PASS_2:-}
      GEMINI_PROXY_PROTO_2: ${GEMINI_PROXY_PROTO_2:-http}
      # Дополнительные прокси (_3, _4, _5)
      GEMINI_PROXY_URL_3: ${GEMINI_PROXY_URL_3:-}
      GEMINI_PROXY_URL_4: ${GEMINI_PROXY_URL_4:-}
      GEMINI_PROXY_URL_5: ${GEMINI_PROXY_URL_5:-}
    command: node src/queue/worker.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ── Frontend (Vue 3 SPA → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL бэкенда для сборки Vite (используется в api.js)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    container_name: seo_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
