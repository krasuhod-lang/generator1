server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Загруженные файлы (скриншоты задач в отчётах и пр.) отдаёт backend.
    # Новые пути используют `/api/uploads/...` (покрыто локацией выше), а этот
    # блок оставляет рабочими ранее сохранённые `/uploads/...`.
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Block access to hidden files and directories: .git, .env, .DS_Store, etc.
    # Also blocks .htaccess / .htpasswd if accidentally deployed.
    location ~ /\.(?!well-known/) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
}
